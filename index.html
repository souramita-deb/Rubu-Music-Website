<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <title>Rubu - Web Player : Music For Everyone</title>
    <script src="https://kit.fontawesome.com/feb428a79c.js" crossorigin="anonymous"></script>

</head>

<body>
    <div class="container flex bg-black">
        <!-------------------------------------------------left side------------------------------------------------------------------->
        <div class="left">
            <div class="home bg-grey rounded m-1 p-1">
                <div class="logo"><img src="images/logo.png" class="logo"></div>
                <ul>

                    <li><i class="fa-solid fa-house"></i>
                        <p>Home</p>
                    </li>
                    <li><i class="fa-solid fa-magnifying-glass"></i>
                        <p>Search</p>
                    </li>

                </ul>

            </div>
            <div class="library bg-grey rounded m-1 p-1">
                <div class="heading">
                    <i class="fa-solid fa-chart-simple"></i>
                    <h2> Your Libraray</h2>
                </div>

                <div class="songlist">
                    <ul>

                    </ul>
                </div>

                <div class="footer">
                    <div><a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                </div>
            </div>
        </div>
        <!----------------------------------------------------------------------------------------right side---------------------------------------->
        <div class="right bg-grey rounded ">
            <div class="header">
                <div class="nav">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000"
                        fill="none">
                        <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" stroke="#ffffff"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000"
                        fill="none">
                        <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" stroke="#ffffff"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="buttons">
                    <button class="signup-btn">Sign Up</button>
                    <button class="login-btn">Log In</button>
                </div>
            </div>

            <div class="rubu-playlist">
                <h2>Rubu Playlist</h2>
                <!--------------------------------------------------------------------------cards and songs-------------------------------------->
                <div class="cardcontainer">

                    <div data-folder="cs" class="card">
                        <div class="play">
                            <i class="fa-solid fa-circle-play"></i>
                        </div>
                        <img src="images/Happy-img.jpeg" alt="">

                        <h2>Happy Hits!</h2>
                        <p>Hits to boost your mood and fill you with happiness</p>
                    </div>

                    <div data-folder="ncs" class="card ">
                        <div class="play">
                            <i class="fa-solid fa-circle-play"></i>
                        </div>
                        <img src="images/Happy-img.jpeg" alt="">
                        <h2>Happy Hits!</h2>
                        <p>Hits to boost your mood and fill you with happiness</p>
                    </div>

                </div>

                <div class="playbar">


                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>

                    <div class="abovebar">

                        <div class="songinfo"></div>

                        <div class="songbuttons">

                            <i class="fa-solid fa-square-caret-left" id="previous"></i>
                            <i class="fa-solid fa-circle-play" id="play"></i>
                            <i class="fa-solid fa-square-caret-right" id="next"></i>

                        </div>

                        <div class="timevol">
                            <div class="songtime"> </div>

                            <div class="volume">
                                <img width="20px" src="volume.svg" alt="">
                                <div class="range">
                                    <input type="range" name="volume" id="">

                                </div>
                            </div>
                        </div>


                    </div>
                </div>
            </div>
        </div>
    </div>
    <!---------------------------------------------------------java script--------------------------------------------------->
    <script src="script.js"></script>
    
</body>

</html>
